<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Gestión de Sedes - Papá Técnico</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #f4f7f6; --card: #ffffff; --text: #2c3e50; --primary: #2980b9;
            --urgent: #e74c3c; --done: #2ecc71; --weekly: #e67e22; --monthly: #8e44ad;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        [data-theme="dark"] {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --primary: #3498db;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 15px; padding-bottom: 140px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        #frase-papa { font-style: italic; font-size: 0.8rem; color: #7f8c8d; margin-bottom: 15px; text-align: center; display: block;}

        .main-form { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid #ddd; }
        
        .input-group { display: flex; gap: 5px; margin-bottom: 10px; }
        input, select, textarea { 
            width: 100%; padding: 12px; border-radius: 8px; 
            border: 1px solid #ddd; background: var(--bg); color: var(--text); font-size: 0.9rem;
        }
        textarea { margin-bottom: 10px; }

        .btn-add-sede { background: var(--primary); color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; }

        .btn-add { 
            width: 100%; padding: 15px; background: var(--primary); color: white; 
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem;
        }

        /* LISTADO */
        .sede-header { 
            width: 100%; padding: 15px; background: var(--card); border: none; 
            display: flex; justify-content: space-between; border-radius: 10px;
            box-shadow: var(--shadow); color: var(--text); font-weight: bold; margin-bottom: 10px; cursor: pointer;
        }
        .task-card { 
            background: var(--card); margin: 12px 0; padding: 15px; border-radius: 12px;
            border-left: 6px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .task-card.urgent { border-left-color: var(--urgent); background: #fffcfc; }
        .task-card.done { border-left-color: var(--done); background: #f0fff4; opacity: 0.8; }
        
        .btn-status {
            width: 100%; margin-top: 10px; padding: 12px; border-radius: 8px; border: none;
            font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .status-pending { background: #ebf5ff; color: #2980b9; border: 1px solid #2980b9; }
        .status-done { background: var(--done); color: white; }

        .img-preview { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-top: 10px; }

        .config-panel { background: var(--card); padding: 15px; border-radius: 12px; margin-top: 30px; border: 1px dashed #ccc; }
        .sede-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 0.85rem; }

        /* NAV BAR */
        .nav-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); 
            display: grid; grid-template-columns: repeat(3, 1fr); padding: 12px; gap: 10px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 100;
        }
        .btn-nav { padding: 10px; border: none; border-radius: 10px; font-size: 0.7rem; font-weight: bold; cursor: pointer; color: white; display: flex; flex-direction: column; align-items: center; gap: 5px; }

        #modal-report {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .report-paper { background: white; color: #333 !important; width: 90%; max-width: 400px; padding: 25px; border-radius: 5px; max-height: 70vh; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>🛠️ SedeMaster PRO</h2>
        <button onclick="toggleTheme()" style="background:none; border:none; color:var(--text); font-size: 1.2rem;"><i class="fas fa-adjust"></i></button>
    </header>
    
    <span id="frase-papa">"Lo arreglamos porque lo arreglamos."</span>

    <div class="main-form">
        <input type="hidden" id="edit-id">
        
        <label style="font-size: 0.75rem; font-weight: bold;">🏢 SELECCIONAR SEDE:</label>
        <div class="input-group">
            <select id="sedeSelect"></select>
            <button class="btn-add-sede" onclick="addSede()" title="Nueva Sede"><i class="fas fa-plus"></i></button>
        </div>

        <select id="priority" style="margin-bottom: 10px;">
            <option value="normal">🟢 Prioridad Normal</option>
            <option value="urgente">🔴 PRIORIDAD URGENTE</option>
        </select>

        <textarea id="taskDesc" placeholder="Detalle del trabajo..." rows="2"></textarea>
        <input type="file" id="taskImg" accept="image/*" style="margin-bottom: 10px;">
        <button class="btn-add" id="btn-save" onclick="saveTask()">💾 GUARDAR TRABAJO</button>
    </div>

    <div id="listContainer"></div>

    <div class="config-panel">
        <h4 style="margin-bottom: 10px; font-size: 0.9rem;">⚙️ PANEL DE CONTROL</h4>
        <div id="sedeManageList"></div>
        <button onclick="clearAllData()" style="width: 100%; margin-top: 20px; padding: 10px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 0.75rem; cursor: pointer;">
            🗑️ REINICIAR TODA LA APP
        </button>
    </div>
</div>

<div id="modal-report">
    <div class="report-paper" id="capture-area">
        <h2 style="text-align: center; border-bottom: 2px dashed #333; padding-bottom: 10px; color: #333;">📋 REPORTE TÉCNICO</h2>
        <p id="rep-date" style="text-align: center; font-size: 0.8rem; margin: 15px 0; font-weight: bold; color: #555;"></p>
        <div id="rep-content" style="color: #333;"></div>
        <p style="text-align: center; margin-top: 20px; font-size: 0.7rem; color: #7f8c8d; border-top: 1px solid #eee; padding-top: 10px;">Orgullosamente hecho por Papá Técnico 👨‍🔧</p>
    </div>
    <div style="margin-top: 20px; display: flex; gap: 10px; width: 90%; max-width: 400px;">
        <button onclick="closeReport()" style="flex:1; padding: 15px; border-radius: 10px; background:#95a5a6; color:white; border:none; font-weight:bold;">VOLVER</button>
        <button onclick="downloadReport()" id="btn-dw" style="flex:1; padding: 15px; border-radius: 10px; background:#2ecc71; color:white; border:none; font-weight:bold;">BAJAR PNG</button>
    </div>
</div>

<div class="nav-bar">
    <button class="btn-nav" onclick="genReport('day')" style="background:var(--primary);"><i class="fas fa-sun"></i> HOY</button>
    <button class="btn-nav" onclick="genReport('week')" style="background:var(--weekly);"><i class="fas fa-tools"></i> SEMANA</button>
    <button class="btn-nav" onclick="genReport('month')" style="background:var(--monthly);"><i class="fas fa-file-invoice"></i> MES</button>
</div>

<script>
    const sedesIniciales = ["San Borja", "Marina 3", "Angamos", "Molina"];
    
    const pendientesIniciales = [
        
        // --- SEDE MOLINA (1 al 16) ---
        { id: 1, sede: "Molina", desc: "¡LLAVE DE GAS CON FUGA! (Revisión inmediata)", priority: "urgente", done: false, date: "23/02/2026" },
        { id: 2, sede: "Molina", desc: "Puerta de vidrio: Pendiente RESORTE, la puerta golpea fuertemente", priority: "urgente", done: false, date: "23/02/2026" },
        { id: 3, sede: "Molina", desc: "Compra de repuesto para puerta de vidrio (Solución definitiva)", priority: "urgente", done: false, date: "23/02/2026" },
        { id: 4, sede: "Molina", desc: "Máquina de frío almacén 1er piso: filtración de agua ocasional", priority: "urgente", done: false, date: "23/02/2026" },
        { id: 5, sede: "Molina", desc: "Lavadero SSHH mujeres 1er piso: base rota", priority: "urgente", done: false, date: "23/02/2026" },
        { id: 6, sede: "Molina", desc: "Cambio de fluorescente en techo de cocina y pasadizo entrada", priority: "urgente", done: false, date: "23/02/2026" },
        { id: 7, sede: "Molina", desc: "Muebles de los boxes presentan deterioro (huecos)", priority: "normal", done: false, date: "23/02/2026" },
        { id: 8, sede: "Molina", desc: "Sillas de bar con espaldar fuera de lugar (Cuarto eléctrico)", priority: "normal", done: false, date: "23/02/2026" },
        { id: 9, sede: "Molina", desc: "Reparación de colomurales en salón, pasadizos y boxes", priority: "normal", done: false, date: "23/02/2026" },
        { id: 10, sede: "Molina", desc: "Reparación de MDF en bar", priority: "normal", done: false, date: "23/02/2026" },
        { id: 11, sede: "Molina", desc: "Habilitar dimers en todos los boxes (están con interruptor)", priority: "normal", done: false, date: "23/02/2026" },
        { id: 12, sede: "Molina", desc: "Pintado de barandas de la escalera", priority: "normal", done: false, date: "23/02/2026" },
        { id: 13, sede: "Molina", desc: "Colocar colomurales en todas las paredes del Box 2", priority: "normal", done: false, date: "23/02/2026" },
        { id: 14, sede: "Molina", desc: "Rellenar las paredes de los demás boxes", priority: "normal", done: false, date: "23/02/2026" },
        { id: 15, sede: "Molina", desc: "LED quemado en el estante superior de la barra", priority: "normal", done: false, date: "23/02/2026" },
        { id: 16, sede: "Molina", desc: "LED de colores fallando (Puerta de almacén 1er piso)", priority: "normal", done: false, date: "23/02/2026" },

        // --- SEDE MARINA 3 (17 al 27 - EXACTAMENTE 11) ---
        { id: 17, sede: "Marina 3", desc: "Barra de Cocina: Filtro malogrado", priority: "urgente", done: false, date: "23/02/2026" },
        { id: 18, sede: "Marina 3", desc: "Salón Principal: Cartel de SALIDA suelto (tornillos y tarugos)", priority: "normal", done: false, date: "23/02/2026" },
        { id: 19, sede: "Marina 3", desc: "Box 2: Interruptores en mal estado", priority: "normal", done: false, date: "23/02/2026" },
        { id: 20, sede: "Marina 3", desc: "Caja: Cambio de gaveta de dinero", priority: "normal", done: false, date: "23/02/2026" },
        { id: 21, sede: "Marina 3", desc: "Escalera: Luz parpadea (del 2do al 3er piso)", priority: "normal", done: false, date: "23/02/2026" },
        { id: 22, sede: "Marina 3", desc: "Box 1: Luz LED parpadea detrás de muebles", priority: "normal", done: false, date: "23/02/2026" },
        { id: 23, sede: "Marina 3", desc: "Box 1: Colocar extractor de aire", priority: "normal", done: false, date: "23/02/2026" },
        { id: 24, sede: "Marina 3", desc: "Baño Mujeres (2do piso): Cambiar foco por uno más luminoso", priority: "normal", done: false, date: "23/02/2026" },
        { id: 25, sede: "Marina 3", desc: "Baño Varones: Cambio de palanca del inodoro", priority: "normal", done: false, date: "23/02/2026" },
        { id: 26, sede: "Marina 3", desc: "Azotea: Puerta no cuenta con cerrojo", priority: "normal", done: false, date: "23/02/2026" },
        { id: 27, sede: "Marina 3", desc: "Ingreso: Pintar pared de entrada y Box 1", priority: "normal", done: false, date: "23/02/2026" },

        // --- SEDE ANGAMOS (28 al 38) ---
        { id: 28, sede: "Angamos", desc: "Soldar parantes en puerta principal", priority: "urgente", done: false, date: "23/02/2026" },
        { id: 29, sede: "Angamos", desc: "Bar: Neones quemados (lado licores)", priority: "normal", done: false, date: "23/02/2026" },
        { id: 30, sede: "Angamos", desc: "Bar: Poner hilo de pescar para sostener licores", priority: "normal", done: false, date: "23/02/2026" },
        { id: 31, sede: "Angamos", desc: "Box 5: Cambio de papel tapiz", priority: "normal", done: false, date: "23/02/2026" },
        { id: 32, sede: "Angamos", desc: "Instalación de lavadero en azotea (limpieza)", priority: "normal", done: false, date: "23/02/2026" },
        { id: 33, sede: "Angamos", desc: "Compra de casilleros (lockers) personal", priority: "normal", done: false, date: "23/02/2026" },
        { id: 34, sede: "Angamos", desc: "Pintado de bases de mesas en boxes", priority: "normal", done: false, date: "23/02/2026" },
        { id: 35, sede: "Angamos", desc: "Colocar topes en puertas de boxes", priority: "normal", done: false, date: "23/02/2026" },
        { id: 36, sede: "Angamos", desc: "Pintar pared Box 4", priority: "normal", done: false, date: "23/02/2026" },
        { id: 37, sede: "Angamos", desc: "Pintado de palancas de inodoros (todos)", priority: "normal", done: false, date: "23/02/2026" },
        { id: 38, sede: "Angamos", desc: "Pintar pared externa Box 8", priority: "normal", done: false, date: "23/02/2026" },

        // --- SEDE SAN BORJA (39 al 43) ---
        { id: 39, sede: "San Borja", desc: "Lavadero de Bar: Hueco y manguera inferior dañada", priority: "urgente", done: false, date: "23/02/2026" },
        { id: 40, sede: "San Borja", desc: "Box 2: Techo manchado con licor pegajoso", priority: "normal", done: false, date: "23/02/2026" },
        { id: 41, sede: "San Borja", desc: "Baño Damas: Ajuste de puerta", priority: "normal", done: true, date: "23/02/2026" },
        { id: 42, sede: "San Borja", desc: "Box 1: Pegar flecha de ruleta", priority: "normal", done: true, date: "23/02/2026" },
        { id: 43, sede: "San Borja", desc: "Box 2: Amortiguador de puerta flojo", priority: "normal", done: true, date: "23/02/2026" }
    ];

    let db = JSON.parse(localStorage.getItem('sede_pro_tasks'));
    let sedes = JSON.parse(localStorage.getItem('sede_pro_list'));

    if (!db || db.length === 0) {
        db = pendientesIniciales;
        localStorage.setItem('sede_pro_tasks', JSON.stringify(db));
    }
    if (!sedes || sedes.length === 0) {
        sedes = sedesIniciales;
        localStorage.setItem('sede_pro_list', JSON.stringify(sedes));
    }

    function initSedes() {
        const select = document.getElementById('sedeSelect');
        select.innerHTML = sedes.map(s => `<option value="${s}">📍 ${s}</option>`).join('');
        const manageList = document.getElementById('sedeManageList');
        manageList.innerHTML = sedes.map((s, idx) => `
            <div class="sede-item">
                <span>📍 ${s}</span>
                <div>
                    <i class="fas fa-trash" onclick="removeSede(${idx})" style="color:var(--urgent); cursor:pointer;"></i>
                </div>
            </div>
        `).join('');
    }

    function addSede() {
        const nueva = prompt("Nombre de la nueva sede:");
        if (nueva && !sedes.includes(nueva)) {
            sedes.push(nueva);
            saveSedes();
        }
    }

    function removeSede(idx) {
        if(confirm(`¿Eliminar la sede "${sedes[idx]}"?`)) {
            sedes.splice(idx, 1);
            saveSedes();
        }
    }

    function saveSedes() {
        localStorage.setItem('sede_pro_list', JSON.stringify(sedes));
        location.reload();
    }

    function clearAllData() {
        if(confirm("Se borrará todo y volverá al estado inicial. ¿Proceder?")) {
            localStorage.clear();
            location.reload();
        }
    }

    async function saveTask() {
        const id = document.getElementById('edit-id').value;
        const desc = document.getElementById('taskDesc').value;
        const sede = document.getElementById('sedeSelect').value;
        const priority = document.getElementById('priority').value;
        const file = document.getElementById('taskImg').files[0];

        if(!desc) return alert("Escribe el detalle");

        let imgBase64 = "";
        if(file) {
            imgBase64 = await new Promise(r => {
                const reader = new FileReader();
                reader.onload = () => r(reader.result);
                reader.readAsDataURL(file);
            });
        }

        if(id) {
            const index = db.findIndex(t => t.id == id);
            db[index].desc = desc;
            db[index].sede = sede;
            db[index].priority = priority;
            if(imgBase64) db[index].img = imgBase64;
        } else {
            db.unshift({ id: Date.now(), sede, desc, priority, img: imgBase64, done: false, date: new Date().toLocaleDateString('es-ES') });
        }

        localStorage.setItem('sede_pro_tasks', JSON.stringify(db));
        location.reload();
    }

    function render() {
        const container = document.getElementById('listContainer');
        container.innerHTML = "";
        
        sedes.forEach(s => {
            const tasks = db.filter(t => t.sede === s);
            if(tasks.length === 0) return;

            const sID = s.replace(/\s/g, '');
            const pendCount = tasks.filter(t => !t.done).length;

            container.innerHTML += `
                <div class="sede-group">
                    <div class="sede-header" onclick="toggleSede('${sID}')">
                        <span>${s}</span>
                        <span style="color:${pendCount > 0 ? 'var(--urgent)' : 'var(--done)'}">${pendCount} Pend.</span>
                    </div>
                    <div id="sede-${sID}" style="display:block; margin-bottom:20px;">
                        ${tasks.map(t => `
                            <div class="task-card ${t.priority === 'urgente'?'urgent':''} ${t.done?'done':''}">
                                <div style="display:flex; justify-content:space-between;">
                                    <div style="flex:1">
                                        <div style="font-size:0.65rem; color:#888;">${t.date}</div>
                                        <b>${t.desc}</b>
                                    </div>
                                    <div style="display:flex; gap:12px;">
                                        <i class="fas fa-edit" style="color:var(--primary);" onclick="prepareEdit(${t.id})"></i>
                                        <i class="fas fa-trash" style="color:var(--urgent);" onclick="deleteTask(${t.id})"></i>
                                    </div>
                                </div>
                                ${t.img ? `<img src="${t.img}" class="img-preview">` : ''}
                                <button class="btn-status ${t.done?'status-done':'status-pending'}" onclick="toggleDone(${t.id})">
                                    ${t.done ? '✅ LISTO' : '⚙️ PENDIENTE'}
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        });
    }

    function prepareEdit(id) {
        const t = db.find(x => x.id === id);
        document.getElementById('edit-id').value = t.id;
        document.getElementById('taskDesc').value = t.desc;
        document.getElementById('sedeSelect').value = t.sede;
        document.getElementById('priority').value = t.priority;
        document.getElementById('btn-save').innerText = "🔄 ACTUALIZAR";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function toggleDone(id) {
        const t = db.find(x => x.id === id);
        t.done = !t.done;
        localStorage.setItem('sede_pro_tasks', JSON.stringify(db));
        render();
    }

    function deleteTask(id) {
        if(confirm("¿Borrar?")) {
            db = db.filter(x => x.id !== id);
            localStorage.setItem('sede_pro_tasks', JSON.stringify(db));
            render();
        }
    }

    function genReport(type) {
        const now = new Date();
        const doneTasks = db.filter(t => t.done);
        let filtered = [];
        let title = "";

        if(type === 'day') {
            const today = now.toLocaleDateString('es-ES');
            filtered = doneTasks.filter(t => t.date === today);
            title = "REPORTE DIARIO - " + today;
        } else if(type === 'week') {
            title = "RESUMEN SEMANAL";
            filtered = doneTasks;
        } else {
            title = "REPORTE MENSUAL";
            filtered = doneTasks;
        }

        if(filtered.length === 0) return alert("No hay trabajos finalizados.");

        const content = document.getElementById('rep-content');
        document.getElementById('rep-date').innerText = title;
        content.innerHTML = "";
        
        const activeSedesRep = [...new Set(filtered.map(t => t.sede))];
        activeSedesRep.forEach(s => {
            const tasks = filtered.filter(t => t.sede === s);
            content.innerHTML += `<div style="margin-bottom:12px;"><p style="font-weight:bold; color:#2980b9;">🏢 ${s}</p>
                ${tasks.map(t => `<p style="font-size:0.8rem; margin-left:10px;">• ${t.desc}</p>`).join('')}</div>`;
        });
        document.getElementById('modal-report').style.display = 'flex';
    }

    function downloadReport() {
        html2canvas(document.getElementById('capture-area'), {scale:2}).then(canvas => {
            const link = document.createElement('a');
            link.download = `Reporte_PapaTecnico_${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    function toggleSede(id) {
        const el = document.getElementById('sede-'+id);
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    function closeReport() { document.getElementById('modal-report').style.display = 'none'; }
    function toggleTheme() {
        const current = document.body.getAttribute('data-theme');
        document.body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    initSedes();
    render();
</script>
</body>
</html>
